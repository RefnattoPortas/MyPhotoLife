name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DB_HOST: localhost
  DB_PORT: 3306
  DB_USER: root
  DB_PASSWORD: root
  DB_NAME: myphotolife_test
  JWT_SECRET: test-jwt-secret-for-ci-with-32-chars-min
  STORAGE_ENDPOINT: http://localhost:9000
  STORAGE_ACCESS_KEY_ID: minioadmin
  STORAGE_SECRET_ACCESS_KEY: minioadmin
  STORAGE_BUCKET_ORIGINALS: test-originals
  STORAGE_BUCKET_OPTIMIZED: test-optimized

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: myphotolife_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Run migrations
        run: npm run migrate
        working-directory: backend
        env:
          DB_PASSWORD: root
          DB_NAME: myphotolife_test
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: backend
        env:
          DB_PASSWORD: root
          DB_NAME: myphotolife_test
          NODE_ENV: test
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          fail_ci_if_error: false

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          API_URL: http://localhost:3001

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit backend
        run: |
          cd backend
          npm ci
          npm audit --production || true
      - name: Audit frontend
        run: |
          cd frontend
          npm ci
          npm audit --production || true
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --results=verified,unknown

  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: backend
      - name: Check coverage thresholds
        run: npx c8 --check-coverage --branches 60 --functions 65 --lines 70 --statements 70 node --test src/**/*.test.js
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: myphotolife_test
          JWT_SECRET: test-jwt-secret-for-ci-with-32-chars-min
